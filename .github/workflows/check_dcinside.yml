name: DCInside 공군 갤러리 키워드 체커

on:
  schedule:
    # 매시간 정각 실행 (UTC 기준 - 한국 시간과 9시간 차이)
    - cron: "0 * * * *"
  workflow_dispatch: {}  # 필요할 때 수동 실행 가능

permissions:
  contents: write  # seen_dcinside.json 커밋을 위해 필요

concurrency:
  group: dcinside-checker
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 크롤러 실행
        env:
          DISCORD_WEBHOOK_URL_AIRFORCE: ${{ secrets.DISCORD_WEBHOOK_URL_AIRFORCE }}
        run: python dcinside_checker.py

      - name: seen_dcinside.json 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_dcinside.json
          git diff --staged --quiet || git commit -m "chore: seen_dcinside.json 업데이트 [skip ci]"
          git push