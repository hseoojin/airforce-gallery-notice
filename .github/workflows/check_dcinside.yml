name: 디시인사이드 갤러리 확인

on:
  schedule:
    # 매시 정각 혼잡을 피하려고 42분에 실행 (1시간 간격)
    - cron: "42 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 필요한 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 갤러리 확인 스크립트 실행
        env:
          DISCORD_WEBHOOK_URL_AIRFORCE: ${{ secrets.DISCORD_WEBHOOK_URL_AIRFORCE }}
        run: python dcinside_checker.py

      - name: 확인 기록 커밋
        run: |
          git config user.name "notice-bot"
          git config user.email "notice-bot@users.noreply.github.com"
          git add seen_dcinside.json
          git diff --staged --quiet || git commit -m "update seen dcinside notices"
          git push